<svg xmlns="http://www.w3.org/2000/svg" width="840" height="196" viewBox="0 0 840 196" role="img" aria-label="Checks do pull request: 3 de 4 passaram, falta o seu review">
  <style>
    text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; fill: #c9d1d9; }
    .item { opacity: 0; animation: reveal .35s ease-out forwards; }
    .k1 { animation-delay: .3s; } .k2 { animation-delay: .7s; }
    .k3 { animation-delay: 1.1s; } .k4 { animation-delay: 1.5s; }
    @keyframes reveal { to { opacity: 1; } }
    .head { fill: #e6edf3; font-weight: 600; }
    .name { fill: #e6edf3; font-weight: 600; }
    .dim  { fill: #8b949e; font-size: 14px; }
    .ok   { fill: #3fb950; font-weight: bold; }
    .warn { fill: #d29922; font-weight: bold; }
    .req  { fill: #8b949e; font-size: 12px; font-weight: 600; }
    .pulse { animation: pulse 1.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes pulse { 50% { opacity: .3; } }
  </style>

  <rect x="1" y="1" width="838" height="194" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <text x="28" y="30" class="head"><tspan class="warn pulse">●</tspan>  3 de 4 checks passaram <tspan class="dim">— o que falta depende de você</tspan></text>
  <line x1="1" y1="44" x2="839" y2="44" stroke="#30363d" stroke-width="1"/>

  <g class="item k1">
    <text x="28" y="76"><tspan class="ok">✓</tspan>  <tspan class="name">build</tspan> <tspan class="dim">— Java 21→25 · Spring Boot 4 · PostgreSQL · Docker · Maven</tspan></text>
  </g>
  <g class="item k2">
    <text x="28" y="110"><tspan class="ok">✓</tspan>  <tspan class="name">integração-com-produção</tspan> <tspan class="dim">— sistema real pra cliente real · demo e walkthrough sob pedido</tspan></text>
  </g>
  <g class="item k3">
    <text x="28" y="144"><tspan class="ok">✓</tspan>  <tspan class="name">formação</tspan> <tspan class="dim">— Engenharia de Software · Montalvânia, MG — Brasil</tspan></text>
  </g>
  <g class="item k4">
    <text x="28" y="178"><tspan class="warn pulse">●</tspan>  <tspan class="name">review</tspan> <tspan class="req">Required</tspan> <tspan class="dim">— um revisor precisa aprovar este PR. Esse revisor é você 👀</tspan></text>
  </g>
</svg>
