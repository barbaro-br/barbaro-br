<svg xmlns="http://www.w3.org/2000/svg" width="840" height="250" viewBox="0 0 840 250" role="img" aria-label="Francisco Montalvão — Backend Developer">
  <style>
    text {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", Consolas, Menlo, monospace;
      font-size: 15px;
      fill: #c9d1d9;
    }
    .line { opacity: 0; animation: reveal .35s ease-out forwards; }
    .d1 { animation-delay: .3s; }
    .d2 { animation-delay: 1.1s; }
    .d3 { animation-delay: 1.5s; }
    .d4 { animation-delay: 1.9s; }
    .d5 { animation-delay: 2.3s; }
    .d6 { animation-delay: 2.7s; }
    .d7 { animation-delay: 3.1s; }
    @keyframes reveal { to { opacity: 1; } }
    .cursor { animation: blink 1.1s steps(1) infinite; animation-delay: 3.1s; opacity: 0; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cmd    { fill: #e6edf3; }
    .prompt { fill: #7ee787; }
    .ok     { fill: #3fb950; font-weight: bold; }
    .key    { fill: #79c0ff; }
    .str    { fill: #a5d6ff; }
    .dim    { fill: #8b949e; }
    .pulse  { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes pulse { 50% { opacity: .35; } }
  </style>

  <!-- card -->
  <rect x="1" y="1" width="838" height="248" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- window bar -->
  <circle cx="26" cy="26" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="26" r="6" fill="#febc2e"/>
  <circle cx="66" cy="26" r="6" fill="#28c840"/>
  <text x="420" y="31" text-anchor="middle" class="dim" font-size="13">montalvao-api — produção</text>

  <!-- status pill -->
  <circle cx="762" cy="26" r="5" fill="#3fb950" class="pulse"/>
  <text x="774" y="31" class="dim" font-size="13">online</text>

  <line x1="1" y1="46" x2="839" y2="46" stroke="#30363d" stroke-width="1"/>

  <!-- body -->
  <text x="28" y="78" class="line d1"><tspan class="prompt">$</tspan> <tspan class="cmd">curl -s https://api.montalvao.dev/v2/whoami</tspan></text>
  <text x="28" y="104" class="line d2 ok">HTTP/1.1 200 OK</text>
  <text x="28" y="130" class="line d3">{</text>
  <text x="28" y="156" class="line d4">  <tspan class="key">"nome"</tspan>: <tspan class="str">"Francisco Montalvão"</tspan>,</text>
  <text x="28" y="182" class="line d5">  <tspan class="key">"cargo"</tspan>: <tspan class="str">"Backend Developer · Java &amp; Spring Boot"</tspan>,</text>
  <text x="28" y="208" class="line d6">  <tspan class="key">"missao"</tspan>: <tspan class="str">"software real para negócios reais"</tspan></text>
  <text x="28" y="234" class="line d7">}<tspan class="cursor"> █</tspan></text>
</svg>
