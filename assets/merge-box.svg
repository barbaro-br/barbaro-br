<svg xmlns="http://www.w3.org/2000/svg" width="840" height="140" viewBox="0 0 840 140" role="img" aria-label="Sem conflitos com o branch base — botão de merge (abre o LinkedIn)">
  <style>
    text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; fill: #c9d1d9; }
    .mono { font-family: ui-monospace, "Cascadia Code", "Fira Code", Consolas, Menlo, monospace; }
    .title { fill: #e6edf3; font-size: 17px; font-weight: 600; }
    .dim   { fill: #8b949e; font-size: 14px; }
    .btn   { animation: glow 2s ease-in-out infinite; }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 0px #23863600); }
      50%      { filter: drop-shadow(0 0 10px #238636cc); }
    }
    .hint { fill: #8b949e; font-size: 14px; font-style: italic; }
  </style>

  <rect x="1" y="1" width="838" height="138" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- big green check -->
  <circle cx="48" cy="52" r="17" fill="#238636"/>
  <g transform="translate(37.5, 41.5) scale(1.3)" fill="#ffffff">
    <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/>
  </g>

  <text x="80" y="46" class="title">Sem conflitos com o branch base</text>
  <text x="80" y="68" class="dim">O merge leva menos de um minuto — squash and merge recomendado: anos de história, um commit objetivo.</text>

  <!-- merge button -->
  <g class="btn">
    <rect x="80" y="86" width="216" height="36" rx="8" fill="#238636"/>
    <text x="188" y="109" text-anchor="middle" fill="#ffffff" font-weight="600">Merge pull request ▾</text>
  </g>
  <text x="312" y="109" class="hint">← clique em qualquer lugar deste card: abre o LinkedIn</text>
</svg>
